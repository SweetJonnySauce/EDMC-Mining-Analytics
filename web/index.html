<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDMC Mining Analytics Web Page</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1216;
      --fg: #f1f5f9;
      --accent: #ff8a00;
      --muted: #9aa4b2;
      --card: #1a1f27;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f7fb;
        --fg: #1f2937;
        --accent: #c45a00;
        --muted: #4b5563;
        --card: #ffffff;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 90% -20%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 60%), var(--bg);
      color: var(--fg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2vw, 2rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .accent {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1><span class="accent">EDMC Mining Analytics</span> local web page</h1>
    <p>
      This page is opened by the new <strong>Open Web</strong> button in the plugin UI.
      You can replace this file with your own local web app.
    </p>
  </main>
</body>
</html>
