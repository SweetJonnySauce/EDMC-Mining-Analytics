<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDMC Mining Analytics Compare</title>
  <link rel="stylesheet" href="/web/css/compare.css">
</head>
<body>
  <main class="app">
    <div class="title-row">
      <h1 id="compare-title">Compare Commodity Yield Across Rings</h1>
      <div class="theme-control">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-haspopup="true" aria-expanded="false">Theme</button>
        <div id="theme-menu" class="theme-menu" aria-hidden="true"></div>
      </div>
    </div>
    <section class="compare-controls">
      <div class="compare-control">
        <label for="compare-commodity-select">Commodity</label>
        <select id="compare-commodity-select" aria-label="Commodity filter"></select>
      </div>
      <div class="compare-control">
        <label for="compare-sort-select">Sort</label>
        <select id="compare-sort-select" aria-label="Sort rings">
          <option value="avg_desc">Avg Yield (mean, High to Low)</option>
          <option value="avg_asc">Avg Yield (mean, Low to High)</option>
          <option value="p50_desc">Median (P50 High to Low)</option>
          <option value="p50_asc">Median (P50 Low to High)</option>
          <option value="p90_desc">P90 (High to Low)</option>
          <option value="p90_asc">P90 (Low to High)</option>
          <option value="p75_desc">P75 (High to Low)</option>
          <option value="p75_asc">P75 (Low to High)</option>
          <option value="p25_desc">P25 (High to Low)</option>
          <option value="p25_asc">P25 (Low to High)</option>
          <option value="name_asc">Ring Name (A to Z)</option>
        </select>
      </div>
      <div class="compare-control compare-control-pill">
        <label>Yield Basis</label>
        <div id="compare-population-options" class="compare-population-options" aria-label="Yield calculation basis"></div>
      </div>
      <div class="compare-control compare-control-pill">
        <label>Crosshairs</label>
        <div id="compare-reference-options" class="compare-reference-options" aria-label="Crosshair overlays"></div>
      </div>
      <div class="compare-control compare-control-pill">
        <label>Display</label>
        <div id="compare-gridline-options" class="compare-population-options" aria-label="Chart display options"></div>
      </div>
    </section>
    <p id="compare-status" class="compare-status"></p>
    <section id="compare-list" class="compare-list"></section>
    <section class="compare-dot-legend" aria-label="Cumulative frequency dot legend">
      <span class="compare-dot-legend-item">
        <span class="compare-dot-legend-swatch compare-dot-legend-swatch--real" aria-hidden="true"></span>
        <span>Real data</span>
      </span>
      <span class="compare-dot-legend-item">
        <span class="compare-dot-legend-swatch compare-dot-legend-swatch--no-data" aria-hidden="true"></span>
        <span>No data</span>
      </span>
    </section>
  </main>

  <script type="module" src="/web/js/compare/main.js"></script>
</body>
</html>
